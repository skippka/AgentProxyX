name: Bug report
description: Report a reproducible AgentProxyX issue.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Run ...
        2. Send ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      render: shell

