name: Feature request
description: Suggest a new agent, provider, firewall rule, or dashboard feature.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What developer pain does this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should AgentProxyX do?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Agent preset
        - Secret Guard
        - Agent Firewall
        - Cost Meter
        - Replay Dashboard
        - MCP integration
        - Provider routing
    validations:
      required: true

